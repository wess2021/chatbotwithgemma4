<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Commerce Chatbot{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <style>
        body { background: #f8f9fa; }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            background: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #e9ecef;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .message-timestamp {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
        }
        .chat-input {
            margin-top: 15px;
        }
        .chat-input .input-group {
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .chat-input .input-group input {
            border: 1px solid #dee2e6;
            border-radius: 25px 0 0 25px;
            padding: 12px 20px;
        }
        .chat-input .input-group button {
            border-radius: 0 25px 25px 0;
            padding: 12px 25px;
        }
        /* Chat Bubble */
        .chat-bubble {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
        .chat-bubble-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 24px;
        }
        .chat-bubble-button:hover {
            transform: scale(1.1);
        }
        .chat-bubble-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 380px;
            height: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }
        .chat-bubble-window.active {
            display: flex;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-bubble-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-bubble-header h6 {
            margin: 0;
            font-weight: 600;
        }
        .chat-bubble-close {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .chat-bubble-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f8f9fa;
        }
        .chat-bubble-input {
            padding: 12px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 8px;
        }
        .chat-bubble-input input {
            flex: 1;
            padding: 8px 15px;
            border: 1px solid #ced4da;
            border-radius: 20px;
            outline: none;
        }
        .chat-bubble-input input:focus {
            border-color: #667eea;
        }
        .chat-bubble-input button {
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
        }
        @media (max-width: 576px) {
            .chat-bubble-window {
                width: 100%;
                height: 80vh;
                bottom: 0;
                right: 0;
                border-radius: 12px 12px 0 0;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Chat Widget -->
    {% include 'chat_bubble.html' %}
    
    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
